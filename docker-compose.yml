version: '3.8'

services:
  # 1. Base de données PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: collector-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collector_db}
      POSTGRES_USER: ${POSTGRES_USER:-collector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collector -d collector_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collector-network

  # 2. Application Backend NestJS
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: collector-backend
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      FORCE_SEEDING: ${FORCE_SEEDING:-false}
      ADMIN_DEFAULT_EMAIL: ${ADMIN_DEFAULT_EMAIL:-admin@collector.shop}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      SELLER_DEFAULT_PASSWORD: ${SELLER_DEFAULT_PASSWORD}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - collector-network

  # 3. Prometheus (Scraping des métriques)
  prometheus:
    image: prom/prometheus:latest
    container_name: collector-prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - collector-network

  # 4. Grafana (Dashboards & Supervision)
  grafana:
    image: grafana/grafana:latest
    container_name: collector-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000" # Port 3001 hôte -> 3000 conteneur (pour éviter le conflit avec NestJS)
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - collector-network

  # 5. PgHero (Supervision SQL PostgreSQL)
  pghero:
    image: ankane/pghero:latest
    container_name: collector-pghero
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-collector}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-collector_db}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - collector-network

  # 6. Siege (Test de charge & Benchmarking HTTP)
  siege:
    image: alpine:3.19
    container_name: collector-siege
    working_dir: /loadtest
    volumes:
      - ./loadtest:/loadtest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache siege
        echo "=========================================================="
        echo " 🚀 Conteneur Siege prêt pour les tests de charge CUBE3 !"
        echo "=========================================================="
        tail -f /dev/null
    depends_on:
      - backend
    networks:
      - collector-network

networks:
  collector-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
