version: 2
updates:
  # Scan de l'écosystème npm pour le projet
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "BastienLeleu"
    labels:
      - "dependencies"
      - "security"

  # Scan des actions GitHub de la CI/CD
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
