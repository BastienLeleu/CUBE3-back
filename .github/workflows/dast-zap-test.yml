name: DAST ZAP Test

on:
  workflow_call:
    secrets:
      JWT_SECRET:
        required: true
      ADMIN_DEFAULT_PASSWORD:
        required: false

jobs:
  dast_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and Build Backend
        run: |
          npm ci
          npm run build

      - name: Start Backend in Background
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_DEFAULT_PASSWORD: ${{ secrets.ADMIN_DEFAULT_PASSWORD }}
        run: |
          npm run start:prod > backend.log 2>&1 &
          npx wait-on http://127.0.0.1:3000 --timeout 60000

      - name: Create ZAP working directory
        run: mkdir -p ${{ github.workspace }}/zap && chmod 777 ${{ github.workspace }}/zap

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          fail_action: false

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-final
          path: |
            report_html.html
            report_md.md
            report_json.json
